<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
    integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
    crossorigin="anonymous" />
  <title>Mahasiswa</title>
</head>

<body class="container d-flex flex-column justify-content-center" style="min-height: 100vh">

  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
    integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"
    integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"
    integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
    crossorigin="anonymous"></script>

  <h1 class="text-center">Daftar Mahasiswa (Kelompok xx)</h1>

  <a href="/add" class="btn btn-success mt-4">Tambah Mahasiswa</a>

  <div class="mt-2">
    <table class="table">
      <thead class="thead-dark">
        <tr>
          <th scope="col">Nama</th>
          <th scope="col">Angkatan</th>
          <th scope="col">Gender</th>
          <th scope="col">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="mhs : ${mahasiswa}">
          <td th:text="${mhs.nama}"></td>
          <td th:text="${mhs.angkatan}"></td>
          <td th:text="${mhs.gender}"></td>
          <td>
            <a th:href="@{/edit/{nim}(nim=${mhs.nim})}" class="btn btn-primary btn-sm">Edit</a>
            <a th:href="@{/delete/{nim}(nim=${mhs.nim})}" class="btn btn-danger btn-sm">Delete</a>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(mahasiswa)}">
          <td colspan="4" class="text-center text-muted">Tidak ada data mahasiswa.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <nav th:if="${totalPages > 1}" aria-label="Page navigation">
    <ul class="pagination justify-content-center">

      <!-- Previous button -->
      <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
        <a class="page-link" th:href="@{/(page=${currentPage - 1})}" aria-label="Previous">
          <span aria-hidden="true">&laquo;</span>
        </a>
      </li>

      <!-- Page numbers -->
      <li class="page-item"
          th:each="i : ${#numbers.sequence(1, totalPages)}"
          th:classappend="${i == currentPage} ? 'active'">
        <a class="page-link" th:href="@{/(page=${i})}" th:text="${i}"></a>
      </li>

      <!-- Next button -->
      <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
        <a class="page-link" th:href="@{/(page=${currentPage + 1})}" aria-label="Next">
          <span aria-hidden="true">&raquo;</span>
        </a>
      </li>

    </ul>
  </nav>

  <p class="text-center text-muted" th:if="${totalPages > 0}">
    Halaman <span th:text="${currentPage}"></span> dari <span th:text="${totalPages}"></span>
  </p>

</body>
</html>
